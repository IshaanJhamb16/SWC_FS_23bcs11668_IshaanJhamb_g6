<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Composer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 2rem 1rem; }

  .post-card {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 1.25rem;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .composer-row { display: flex; gap: 12px; }

  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #dbeafe;
    color: #1d4ed8;
    font-size: 14px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  textarea {
    width: 100%; min-height: 110px;
    border: none; outline: none; resize: none;
    font-size: 16px; line-height: 1.6;
    background: transparent;
    font-family: inherit;
    color: #111;
  }
  textarea::placeholder { color: #aaa; }

  .over-msg {
    font-size: 12px;
    color: #dc2626;
    min-height: 16px;
    margin-top: 4px;
  }

  .divider { border: none; border-top: 1px solid #f0f0f0; margin: 0.75rem 0; }

  .footer { display: flex; align-items: center; justify-content: space-between; }

  .icon-btn {
    background: none; border: none;
    color: #888; cursor: pointer;
    padding: 6px; border-radius: 6px; font-size: 18px;
  }
  .icon-btn:hover { background: #f5f5f5; color: #333; }

  .ring { width: 22px; height: 22px; flex-shrink: 0; }
  .ring-bg { fill: none; stroke: #e5e5e5; stroke-width: 3; }
  .ring-fill {
    fill: none; stroke-width: 3; stroke-linecap: round;
    stroke-dasharray: 50.265; /* 2π×8 */
    stroke-dashoffset: 50.265;
    transform: rotate(-90deg); transform-origin: 50% 50%;
    transition: stroke-dashoffset 0.2s, stroke 0.2s;
  }

  .counter { font-size: 13px; font-weight: 500; color: #aaa; }
  .counter.warn  { color: #d97706; }
  .counter.danger{ color: #dc2626; }

  .submit-btn {
    padding: 7px 18px;
    border-radius: 999px;
    font-size: 14px; font-weight: 600;
    border: none; cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
  }
  .submit-btn:enabled  { background: #6d28d9; color: #fff; }
  .submit-btn:enabled:hover  { background: #5b21b6; }
  .submit-btn:enabled:active { transform: scale(0.97); }
  .submit-btn:disabled { background: #f0f0f0; color: #bbb; cursor: not-allowed; }

  .toast {
    display: none; align-items: center; gap: 8px;
    font-size: 13px; color: #065f46;
    background: #d1fae5; border-radius: 8px;
    padding: 8px 12px; margin-top: 0.75rem;
  }
  .toast.show { display: flex; }
</style>
</head>
<body>

<div class="post-card">
  <div class="composer-row">
    <div class="avatar">AJ</div>
    <div style="flex:1">
      <textarea
        id="txt"
        placeholder="What's on your mind?"
        aria-label="Post content"
        aria-describedby="char-counter over-msg"
      ></textarea>
      <p class="over-msg" id="over-msg" role="alert" aria-live="polite"></p>
    </div>
  </div>

  <hr class="divider">

  <div class="footer">
    <div style="display:flex;gap:4px;">
      <button class="icon-btn" aria-label="Attach image">🖼</button>
      <button class="icon-btn" aria-label="Add emoji">😊</button>
      <button class="icon-btn" aria-label="Attach file">📎</button>
    </div>

    <div style="display:flex;align-items:center;gap:12px;">
      <!-- Circular progress ring -->
      <svg class="ring" viewBox="0 0 22 22" aria-hidden="true">
        <circle class="ring-bg" cx="11" cy="11" r="8"/>
        <circle class="ring-fill" id="ring-fill" cx="11" cy="11" r="8" stroke="#1D9E75"/>
      </svg>

      <span class="counter" id="char-counter" aria-live="polite" aria-atomic="true">200</span>

      <div style="width:1px;height:20px;background:#e5e5e5;"></div>

      <button class="submit-btn" id="submit-btn" disabled>Post</button>
    </div>
  </div>

  <div class="toast" id="toast" role="status">✅ <span id="toast-msg">Posted successfully!</span></div>
</div>

<script>
(function () {
  const MAX   = 200;
  const WARN  = 0.8;   // 80% threshold → amber
  const CIRC  = 2 * Math.PI * 8; // circumference for r=8

  const txt       = document.getElementById('txt');
  const counter   = document.getElementById('char-counter');
  const ringFill  = document.getElementById('ring-fill');
  const submitBtn = document.getElementById('submit-btn');
  const toast     = document.getElementById('toast');
  const toastMsg  = document.getElementById('toast-msg');
  const overMsg   = document.getElementById('over-msg');

  function update() {
    const len       = txt.value.length;
    const remaining = MAX - len;
    const ratio     = len / MAX;

    // Counter text & color
    counter.textContent = remaining;
    counter.className   = 'counter' + (ratio >= 1 ? ' danger' : ratio >= WARN ? ' warn' : '');

    // Ring fill
    const offset = CIRC * (1 - Math.min(ratio, 1));
    ringFill.style.strokeDashoffset = offset;
    ringFill.setAttribute('stroke',
      ratio >= 1    ? '#dc2626' :
      ratio >= WARN ? '#d97706' : '#1D9E75'
    );

    // Over-limit message
    overMsg.textContent = len > MAX
      ? `${len - MAX} character${len - MAX > 1 ? 's' : ''} over limit — please shorten your post`
      : '';

    // Submit state
    submitBtn.disabled = txt.value.trim().length === 0 || len > MAX;
  }

  // Input event — throttle with requestAnimationFrame for perf
  let rafPending = false;
  txt.addEventListener('input', () => {
    if (!rafPending) {
      rafPending = true;
      requestAnimationFrame(() => { update(); rafPending = false; });
    }
  });

  // Paste: trim to MAX instead of blocking
  txt.addEventListener('paste', (e) => {
    e.preventDefault();
    const paste = (e.clipboardData || window.clipboardData).getData('text');
    const sel    = txt.selectionStart;
    const selEnd = txt.selectionEnd;
    const combined = txt.value.slice(0, sel) + paste + txt.value.slice(selEnd);
    txt.value = combined.slice(0, MAX);
    txt.selectionStart = txt.selectionEnd = Math.min(sel + paste.length, MAX);
    update();
  });

  // Submit
  submitBtn.addEventListener('click', () => {
    const text = txt.value.trim();
    if (!text || text.length > MAX) return;

    toastMsg.textContent = `Posted: "${text.slice(0, 50)}${text.length > 50 ? '…' : ''}"`;
    toast.classList.add('show');
    txt.value = '';
    update();
    setTimeout(() => toast.classList.remove('show'), 3500);
  });

  update(); // initial state
})();
</script>
</body>
</html>
