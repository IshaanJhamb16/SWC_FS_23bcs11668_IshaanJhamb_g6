<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Carousel</title>

  <style>
    /* ── Page ── */
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h2 {
      margin-bottom: 16px;
      color: #222;
    }

    /* ── Carousel box ── */
    .carousel {
      position: relative;
      width: 560px;
      overflow: hidden;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    /* ── Slides ── */
    .slide {
      display: none;          /* hidden by default */
    }

    .slide.active {
      display: block;         /* only the active slide is visible */
    }

    .slide img {
      width: 100%;
      height: 360px;
      object-fit: cover;
      display: block;
    }

    /* ── Prev / Next buttons ── */
    .prev-btn,
    .next-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.85);
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 20px;
      cursor: pointer;
    }

    .prev-btn { left: 12px; }
    .next-btn { right: 12px; }

    .prev-btn:hover,
    .next-btn:hover {
      background: #fff;
    }

    /* ── Slide counter ── */
    .counter {
      position: absolute;
      top: 12px;
      right: 14px;
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── Dot indicators ── */
    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 14px 0;
      background: #fff;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ccc;
      cursor: pointer;
      border: none;
    }

    .dot.active {
      background: #2874f0;   /* Flipkart blue */
    }

    /* ── Progress bar ── */
    .progress-bar {
      height: 3px;
      background: #e0e0e0;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #2874f0;
      transition: width 0.08s linear;
    }
  </style>
</head>
<body>

  <h2>Product Image Carousel</h2>

  <!-- ── Carousel ── -->
  <div class="carousel" id="carousel">

    <!-- Slides -->
    <div class="slide active">
      <img src="C:\Users\jhamb\OneDrive\Pictures\Saved Pictures\anime-girl-girly-3840x2160-9792.jpg" alt="Watch" />
    </div>
    <div class="slide">
      <img src="C:\Users\jhamb\OneDrive\Pictures\Saved Pictures\sasuke-uchiha-dark-3840x2160-19881.jpg" alt="Camera" />
    </div>
    <div class="slide">
      <img src="C:\Users\jhamb\OneDrive\Pictures\Saved Pictures\sung-jinwoo-dagger-3840x2160-14605.jpg" alt="Sneakers" />
    </div>
    <div class="slide">
      <img src="C:\Users\jhamb\OneDrive\Pictures\_abb00992-c6a8-43fb-86ea-3d25bc353806.jpeg.jpg" alt="Headphones" />
    </div>
    <div class="slide">
      <img src="C:\Users\jhamb\OneDrive\Pictures\1398035.jpg" alt="Bag" />
    </div>

    <!-- Prev / Next buttons -->
    <button class="prev-btn" onclick="changeSlide(-1)">&#8592;</button>
    <button class="next-btn" onclick="changeSlide(+1)">&#8594;</button>

    <!-- Slide counter (e.g. "2 / 5") -->
    <span class="counter" id="counter">1 / 5</span>

  </div>

  <!-- Progress bar (outside the overflow:hidden box) -->
  <div class="progress-bar" style="width:560px; border-radius: 0 0 8px 8px;">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Dot indicators -->
  <div class="dots" style="width:560px; border-radius: 0 0 12px 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
    <!-- dots are created by JavaScript below -->
  </div>


  <script>
    // ─────────────────────────────────────────
    // Settings — change these to customise
    // ─────────────────────────────────────────
    const INTERVAL = 3000;   // ms between auto-slides (3 seconds)

    // ─────────────────────────────────────────
    // Grab all elements we need
    // ─────────────────────────────────────────
    const carousel    = document.getElementById('carousel');
    const slides      = document.querySelectorAll('.slide');
    const counter     = document.getElementById('counter');
    const progressFill = document.getElementById('progressFill');
    const dotsContainer = document.querySelector('.dots');

    const total = slides.length;   // total number of slides
    let current = 0;               // index of the active slide
    let isPaused = false;          // true when mouse is hovering

    // ─────────────────────────────────────────
    // Build dot buttons dynamically
    // ─────────────────────────────────────────
    slides.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('aria-label', 'Go to slide ' + (i + 1));
      dot.addEventListener('click', () => goTo(i));
      dotsContainer.appendChild(dot);
    });

    function getDots() {
      return dotsContainer.querySelectorAll('.dot');
    }

    // ─────────────────────────────────────────
    // Go to a specific slide by index
    // ─────────────────────────────────────────
    function goTo(index) {
      // Remove "active" from the current slide and dot
      slides[current].classList.remove('active');
      getDots()[current].classList.remove('active');

      // Update index (wrap around using modulo)
      current = (index + total) % total;

      // Add "active" to the new slide and dot
      slides[current].classList.add('active');
      getDots()[current].classList.add('active');

      // Update the "2 / 5" counter
      counter.textContent = (current + 1) + ' / ' + total;

      // Restart progress bar
      resetProgress();
    }

    // ─────────────────────────────────────────
    // Go to next or previous slide
    // Called by the arrow buttons with +1 or -1
    // ─────────────────────────────────────────
    function changeSlide(direction) {
      goTo(current + direction);
    }

    // ─────────────────────────────────────────
    // Progress bar — fills up over INTERVAL ms
    // ─────────────────────────────────────────
    let progressValue = 0;
    let progressTimer = null;

    function resetProgress() {
      clearInterval(progressTimer);   // stop old timer
      progressValue = 0;
      progressFill.style.width = '0%';

      if (!isPaused) {
        startProgress();
      }
    }

    function startProgress() {
      const tickEvery = 50;                         // update every 50 ms
      const step = 100 / (INTERVAL / tickEvery);   // how much % to add each tick

      progressTimer = setInterval(() => {
        progressValue += step;
        progressFill.style.width = Math.min(progressValue, 100) + '%';
      }, tickEvery);
    }

    // ─────────────────────────────────────────
    // Auto-slide — moves to next slide every INTERVAL ms
    // ─────────────────────────────────────────
    const autoTimer = setInterval(() => {
      if (!isPaused) {
        goTo(current + 1);
      }
    }, INTERVAL);

    // ─────────────────────────────────────────
    // Pause on hover
    // ─────────────────────────────────────────
    carousel.addEventListener('mouseenter', () => {
      isPaused = true;
      clearInterval(progressTimer);   // freeze the progress bar
    });

    carousel.addEventListener('mouseleave', () => {
      isPaused = false;
      startProgress();                // resume progress bar
    });

    // ─────────────────────────────────────────
    // Start everything
    // ─────────────────────────────────────────
    startProgress();
  </script>

</body>
</html>
